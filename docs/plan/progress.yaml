# Build Loop — Progress State
# Schema: config + state read every iteration. Validate with yamllint.

config:
  verify: "npm run typecheck && npm run lint && npm test && npm run build"
  max_tasks_per_phase: 200
  quality_check_suppressions: []

state:
  task_number: 10
  phase: foundation
  phase_complete: true
  review_complete: true
  retro_complete: true
  status: running
  last_result: pass
  next_task: null
  consecutive_fails: 0
  completed_stories: [US-L1, US-L2, US-L3, US-L4, US-L5]
