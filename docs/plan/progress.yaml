# Build Loop — Progress State
# Schema: config + state read every iteration. Validate with yamllint.

config:
  verify: "npm run typecheck && npm run lint && npm test && npm run build"
  max_tasks_per_phase: 200
  quality_check_suppressions: []

state:
  task_number: 4
  phase: daily-ready
  phase_complete: false
  review_stage: null
  review_complete: false
  retro_complete: false
  pr_number: null
  status: running
  last_result: pass
  next_task: "[US-D2] Implement: add dark mode — [data-theme=dark] + prefers-color-scheme blocks in tokens.css, theme toggle component, inline script in index.html, tokenize remaining hardcoded colors in component CSS files"
  consecutive_fails: 0
  completed_stories: [US-D1]
