# Build Loop — Progress State
# Schema: config + state read every iteration. Validate with yamllint.

config:
  verify: "npm run typecheck && npm run lint && npm test && npm run build"
  max_tasks_per_phase: 200
  quality_check_suppressions: []

state:
  task_number: 5
  phase: always-on
  phase_complete: false
  review_stage: null
  review_complete: false
  retro_complete: false
  pr_number: null
  status: running
  last_result: pass
  next_task: "[phase] Update AGENTS.md — add deploy/ to directory layout, add deploy/com.mustard.lense.plist to file ownership table"
  consecutive_fails: 0
  completed_stories: [US-D6]
