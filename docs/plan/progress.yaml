# Build Loop — Progress State
# Schema: config + state read every iteration. Validate with yamllint.

config:
  verify: "npm run typecheck && npm run lint && npm test && npm run build"
  max_tasks_per_phase: 200
  quality_check_suppressions: []

state:
  task_number: 8
  phase: typography-layout
  phase_complete: true
  review_stage: review_posted
  review_complete: false
  retro_complete: false
  pr_number: 8
  status: running
  last_result: pass
  next_task: "[review] handle-pr-review pr=8 auto=true"
  consecutive_fails: 0
  completed_stories: [US-R1, US-R2]
